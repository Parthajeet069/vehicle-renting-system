<!DOCTYPE html>
<html>
<head>

    <title>Rent Vehicle</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            Parth Garage
        </div>

        <div class="nav-links">

            <a href="/">Home</a>

            <a href="/#about">About Us</a>

            <a href="/#services">Services</a>

            <a href="/#contact">Contact</a>

        </div>

    </div>

    <!-- RENT FORM -->

    <div class="rent-page">

        <div class="rent-box">

            <h1>Rent {{ vehicle_name }}</h1>

            <p>
                Fill in your details to confirm your booking
            </p>

            <form method="POST" enctype="multipart/form-data">

                <label>Your Name</label>

                <input type="text"
                       name="customer_name"
                       placeholder="Enter your name"
                       required>

                <label>Number of Days</label>

                <input type="number"
                       name="days"
                       placeholder="Enter rental days"
                       required>


                       <label>Driver License Number</label>

                <input type="text"
                      name="license"
                      placeholder="Enter your license number"
                      required>

                <label>Upload Aadhaar Card</label>

                <input type="file"
                    name="aadhaar"
                    accept="image/*"
                    required>

                <button type="submit">
                    Confirm Booking
                </button>

            </form>

        </div>

    </div>

</body>
</html>
